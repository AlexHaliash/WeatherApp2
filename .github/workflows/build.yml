name: Build KMP App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build Android Debug APK
        run: ./gradlew :androidApp:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: androidApp/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build for iOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build iOS Framework
        run: ./gradlew :shared:linkDebugFrameworkIosArm64

    build-desktop:
    name: Build for Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build Desktop Application
        run: ./gradlew :shared:compileKotlinJvm   # или :shared:run
      - name: Upload Desktop App
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app
          path: shared/build/classes/kotlin/jvm/

  build-web:
    name: Build for Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Build Web Application
        run: ./gradlew :shared:wasmJsBrowserDistribution   # или :shared:jsBrowserDistribution
      - name: Upload Web App
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: shared/build/dist/wasmJs/productionExecutable/
